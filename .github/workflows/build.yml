name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  build:
    if: github.event_name != 'issue_comment'
    uses: linuxmint/github-actions/.github/workflows/do-builds.yml@master
    with:
      commit_id: master
      ############################## Comma separated list - like 'linuxmint/xapp, linuxmint/cinnamon-desktop'
      dependencies: linuxmint/xapp
      ##############################

  # Generate test packages when /generate-test-packages is commented on a PR
  generate-test-packages:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    uses: linuxmint/github-actions/.github/workflows/generate-test-packages.yml@master
    secrets: inherit
    with:
      comment_body: ${{ github.event.comment.body }}
      comment_user: ${{ github.event.comment.user.login }}
      comment_id: ${{ github.event.comment.id }}
      issue_number: ${{ github.event.issue.number }}
      ############################## Comma separated list - like 'linuxmint/xapp, linuxmint/cinnamon-desktop'
      dependencies: linuxmint/xapp

  test:
    needs: [build]
    if: github.event_name != 'issue_comment'
    runs-on: linuxmint
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pytest/requirements.txt ]; then pip install -r pytest/requirements.txt; fi

      - name: Check Syntax with flake8
        run: |
          flake8 --extend-ignore=E501 usr/lib/hypnotix/xtream.py

      - name: Run Tests
        run: |
          python3 -m pytest --cov=xtream --cov-report=html pytest/test_xtream.py
